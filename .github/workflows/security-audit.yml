name: Security Audit

on:
  push:
    branches:
      - security/remediation-2026-06-25
      - security/**
  pull_request:
    branches:
      - security/remediation-2026-06-25
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  npm-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Capture npm audit report
        shell: bash
        run: npm audit --json > npm-audit.json || true

      - name: Summarize vulnerabilities
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const report = JSON.parse(fs.readFileSync('npm-audit.json', 'utf8'));
          const totals = report.metadata?.vulnerabilities ?? {};
          console.log(`TOTALS ${JSON.stringify(totals)}`);

          const vulnerabilities = Object.entries(report.vulnerabilities ?? {});
          if (vulnerabilities.length === 0) {
            console.log('NO_VULNERABILITIES');
          }

          for (const [name, item] of vulnerabilities) {
            console.log(`PACKAGE ${name}`);
            console.log(`SEVERITY ${item.severity}`);
            console.log(`DIRECT ${item.isDirect}`);
            console.log(`RANGE ${item.range}`);
            console.log(`NODES ${(item.nodes ?? []).join(',')}`);
            for (const via of item.via ?? []) {
              if (typeof via === 'object') {
                console.log(`ADVISORY ${via.source}|${via.title}|${via.severity}|${via.range}|${via.url}`);
              } else {
                console.log(`VIA ${via}`);
              }
            }
            console.log(`FIX ${JSON.stringify(item.fixAvailable)}`);
            console.log('END_PACKAGE');
          }
          NODE

      - name: Enforce audit gate
        run: npm audit --audit-level=high
