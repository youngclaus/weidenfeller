name: Security Audit

on:
  push:
    branches:
      - security/remediation-2026-06-25
      - security/**
  pull_request:
    branches:
      - security/remediation-2026-06-25
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  npm-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        id: audit
        shell: bash
        run: |
          set +e
          npm audit --json > npm-audit.json
          status=$?
          cat npm-audit.json
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Summarize vulnerabilities
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const report = JSON.parse(fs.readFileSync('npm-audit.json', 'utf8'));
          console.log(JSON.stringify(report.metadata?.vulnerabilities ?? {}, null, 2));
          for (const [name, item] of Object.entries(report.vulnerabilities ?? {})) {
            console.log(`VULNERABILITY ${name} ${item.severity} direct=${item.isDirect} range=${item.range}`);
            for (const via of item.via ?? []) {
              if (typeof via === 'object') {
                console.log(`  VIA ${via.source} ${via.title} ${via.range} ${via.url}`);
              } else {
                console.log(`  VIA ${via}`);
              }
            }
            console.log(`  FIX ${JSON.stringify(item.fixAvailable)}`);
          }
          NODE

      - name: Enforce audit gate
        run: npm audit --audit-level=high
