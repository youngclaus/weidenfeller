name: Security Audit

on:
  push:
    branches:
      - security/remediation-2026-06-25
      - security/**
  pull_request:
    branches:
      - security/remediation-2026-06-25
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  npm-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Capture npm audit report
        shell: bash
        run: npm audit --json > npm-audit.json || true

      - name: Write vulnerability summary
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const report = JSON.parse(fs.readFileSync('npm-audit.json', 'utf8'));
          const lines = [];
          const totals = report.metadata?.vulnerabilities ?? {};
          lines.push(`TOTALS ${JSON.stringify(totals)}`);

          const vulnerabilities = Object.entries(report.vulnerabilities ?? {});
          if (vulnerabilities.length === 0) {
            lines.push('NO_VULNERABILITIES');
          }

          for (const [name, item] of vulnerabilities) {
            lines.push(`PACKAGE ${name}`);
            lines.push(`SEVERITY ${item.severity}`);
            lines.push(`DIRECT ${item.isDirect}`);
            lines.push(`RANGE ${item.range}`);
            lines.push(`NODES ${(item.nodes ?? []).join(',')}`);
            for (const via of item.via ?? []) {
              if (typeof via === 'object') {
                lines.push(`ADVISORY ${via.source}|${via.title}|${via.severity}|${via.range}|${via.url}`);
              } else {
                lines.push(`VIA ${via}`);
              }
            }
            lines.push(`FIX ${JSON.stringify(item.fixAvailable)}`);
            lines.push('END_PACKAGE');
          }

          fs.writeFileSync('npm-audit-summary.txt', `${lines.join('\n')}\n`);
          console.log(lines.join('\n'));
          NODE

      - name: Upload audit summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit-summary
          path: |
            npm-audit-summary.txt
            npm-audit.json
          if-no-files-found: error
          retention-days: 7

      - name: Enforce audit gate
        run: npm audit --audit-level=high
