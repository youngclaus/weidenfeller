name: PR Build

on:
  push:
    branches:
      - security/**
  pull_request:
    branches:
      - security/remediation-2026-06-25
      - master

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Capture typecheck diagnostics
        continue-on-error: true
        run: npm run typecheck > typecheck.log 2>&1

      - name: Upload typecheck diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: typecheck-diagnostics
          path: typecheck.log
          if-no-files-found: error

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
