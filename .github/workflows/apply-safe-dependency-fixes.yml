name: Prepare Safe Dependency Fixes

on:
  pull_request:
    branches:
      - security/remediation-2026-06-25

permissions:
  contents: write

jobs:
  prepare:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24.x
          cache: npm
      - run: npm ci
      - run: npm audit fix || true
      - run: npm run build
      - run: npm audit --json > npm-audit-after.json || true
      - uses: actions/upload-artifact@v4
        with:
          name: safe-dependency-updates
          path: |
            package.json
            package-lock.json
            npm-audit-after.json
          retention-days: 7
      - name: Commit reviewed dependency files
        shell: bash
        run: |
          if git diff --quiet -- package.json package-lock.json; then
            echo "No dependency changes generated."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          git commit -m "fix: apply non-breaking dependency security updates"
          git push origin HEAD:${{ github.head_ref }}
