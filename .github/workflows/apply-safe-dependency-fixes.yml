name: Prepare Safe Dependency Fixes

on:
  pull_request:
    branches:
      - security/remediation-2026-06-25

permissions:
  contents: read

jobs:
  prepare:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24.x
          cache: npm
      - run: npm ci
      - run: npm audit fix || true
      - run: npm run build
      - run: npm audit --json > npm-audit-after.json || true
      - uses: actions/upload-artifact@v4
        with:
          name: safe-dependency-updates
          path: |
            package.json
            package-lock.json
            npm-audit-after.json
          retention-days: 7
