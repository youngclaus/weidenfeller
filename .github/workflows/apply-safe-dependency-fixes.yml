name: Apply Safe Dependency Fixes

on:
  push:
    branches:
      - security/safe-dependency-updates

permissions:
  contents: write

jobs:
  apply-fixes:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: security/safe-dependency-updates
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Apply non-breaking audit fixes
        run: npm audit fix

      - name: Verify production build
        run: npm run build

      - name: Commit dependency updates
        shell: bash
        run: |
          if git diff --quiet -- package.json package-lock.json; then
            echo "No dependency changes generated."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          git commit -m "fix: apply non-breaking dependency security updates"
          git push origin HEAD:security/safe-dependency-updates
